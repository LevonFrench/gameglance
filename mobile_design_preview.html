<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameGlance Mobile Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Base Colors */
            --bg-slate: #121218;
            --surface-glass: rgba(22, 22, 34, 0.75);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-medium: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            
            /* SNES Accents */
            --accent-purple: #8162b7;
            --accent-yellow: #ffcc00;

            /* Typography */
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-slate);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            padding: 2rem;
            min-height: 100vh;
        }

        /* Phone Container Mockup */
        .phone-mockup {
            width: 390px;
            height: 844px;
            background: var(--bg-slate);
            border-radius: 40px;
            border: 8px solid #333;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Sticky Navigation Header */
        .header {
            position: sticky;
            top: 0;
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid var(--border-subtle);
            padding: 1rem;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .nav-btn {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .game-title {
            font-family: var(--font-display);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-purple);
            font-weight: 700;
        }

        .char-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1.1;
        }

        /* Swipeable Filter Chips */
        .filters {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem 1rem;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border-subtle);
        }
        .filters::-webkit-scrollbar { display: none; }

        .chip {
            padding: 0 1rem;
            height: 36px;
            display: flex;
            align-items: center;
            white-space: nowrap;
            background: var(--surface-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 18px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .chip.active {
            background: var(--accent-purple);
            color: white;
            border-color: var(--accent-purple);
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Move Card */
        .move-card {
            background: var(--surface-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .move-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.25rem;
        }

        .move-info {
            display: flex;
            flex-direction: column;
        }

        .move-name {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .move-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-yellow);
            font-weight: 600;
        }

        .select-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-medium);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .move-card.selected {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .move-card.selected .select-btn {
            background: #22c55e;
            border-color: #22c55e;
            color: #000;
        }

        /* Numpad Input Display */
        .input-display {
            background: rgba(0,0,0,0.4);
            padding: 0.75rem;
            border-radius: 12px;
            border: 1px inset rgba(255,255,255,0.05);
            display: flex;
            gap: 0.5rem;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 1.2rem;
        }

        .input-arrow {
            color: var(--accent-purple);
            text-shadow: 0 0 10px rgba(129, 98, 183, 0.5);
        }

        .input-button {
            background: #e0e0e0;
            color: #000;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            box-shadow: 0 4px 0 #999, inset 0 -2px 0 rgba(0,0,0,0.2);
            font-weight: bold;
            margin-left: 0.5rem;
        }

        /* Notes Section */
        .move-notes {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            background: rgba(255, 204, 0, 0.15);
            color: var(--accent-yellow);
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 0.5rem;
        }

        /* Bottom Header / Footer */
        .bottom-footer {
            background: rgba(18, 18, 24, 0.95);
            border-top: 1px solid var(--border-subtle);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .footer-action {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }

        .notation-toggle {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2px;
        }

        .notation-option {
            padding: 0.2rem 0.75rem;
            border-radius: 18px;
            font-size: 0.75rem;
        }

        .notation-option.active {
            background: var(--text-primary);
            color: #000;
        }

    </style>
</head>
<body>

    <div class="phone-mockup">
        <!-- Sticky Header -->
        <div class="header">
            <div class="header-top">
                <button class="nav-btn" style="width: 36px; height: 36px; font-size: 1rem;">🏠</button>
                <button class="nav-btn" style="width: 36px; height: 36px; font-size: 1rem;">←</button>
                <div class="game-title">Street Fighter III: 3rd Strike</div>
            </div>
            <div class="char-title">Chun-Li</div>
        </div>

        <!-- Filter Chips -->
        <div class="filters">
            <div class="chip active">All Moves</div>
            <div class="chip">Special Moves</div>
            <div class="chip">Super Arts</div>
            <div class="chip">Command Normals</div>
            <div class="chip">Throws</div>
        </div>

        <!-- Content -->
        <div class="content">
            
            <!-- Card 1 (Selected) -->
            <div class="move-card selected">
                <div class="move-header">
                    <div class="move-info">
                        <div class="move-type">Special Move</div>
                        <div class="move-name">Kikouken</div>
                    </div>
                    <button class="select-btn">✓</button>
                </div>
                <div class="input-display">
                    <span class="input-arrow">←</span> 
                    <span class="input-arrow" style="font-size: 0.8em">Charge</span> 
                    <span class="input-arrow">→</span>
                    <div class="input-button">P</div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="move-card">
                <div class="move-header">
                    <div class="move-info">
                        <div class="move-type">Super Art II</div>
                        <div class="move-name">Houyoku Sen</div>
                    </div>
                    <button class="select-btn">+</button>
                </div>
                <div class="input-display">
                    <span class="input-arrow">↓</span>
                    <span class="input-arrow">↘</span>
                    <span class="input-arrow">→</span>
                    <span class="input-arrow">↓</span>
                    <span class="input-arrow">↘</span>
                    <span class="input-arrow">→</span>
                    <div class="input-button" style="background: #3b82f6; box-shadow: 0 4px 0 #1d4ed8, inset 0 -2px 0 rgba(0,0,0,0.2); color: white;">K</div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="move-card">
                <div class="move-header">
                    <div class="move-info">
                        <div class="move-type">Command Normal</div>
                        <div class="move-name">Hakkei</div>
                    </div>
                    <button class="select-btn">+</button>
                </div>
                <div class="input-display">
                    <span class="input-arrow">←</span>
                    <div class="input-button">HP</div>
                </div>
            </div>

        </div>

        <!-- Bottom Footer (Fightcade Sync & Notation Toggle) -->
        <div class="bottom-footer">
            <div class="footer-action">
                <div class="sync-dot"></div>
                Fightcade Synced
            </div>
            <div class="notation-toggle">
                <div class="notation-option active">Arrows</div>
                <div class="notation-option">Numpad</div>
            </div>
        </div>
    </div>

</body>
</html>
